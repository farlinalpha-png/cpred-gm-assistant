name: Release

# Push a tag like v3.3.0 (matching the "version" in cpred-app/package.json) to build
# Windows + macOS installers and attach them as a single draft GitHub Release.
# electron-updater (wired up in src/main.js) reads that release feed to auto-update
# installed copies of the app.
#
# Both quirks below were found by actually running this pipeline end-to-end
# (not just written from docs), so don't "simplify" them away without retesting:
#
# 1. The two platform jobs run sequentially (mac then windows), not in a
#    parallel matrix. Running them at once let each job's electron-builder
#    invocation race to create the GitHub Release for the tag independently.
#
# 2. Even within a single mac job, electron-builder's own zip-blockmap
#    generation step (for electron-updater) fires its own concurrent
#    "get-or-create release" call, separate from the main dmg/zip upload —
#    racing internally and creating a second duplicate draft release even
#    with only one job building one architecture. Pre-creating the release
#    before electron-builder runs sidesteps this: every concurrent caller
#    just finds and reuses the existing release instead of racing to create it.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: cpred-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Ensure draft release exists for this tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release view "v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create "v$VERSION" --repo "${{ github.repository }}" --draft --title "$VERSION" --notes "Automated build"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: build-mac
    runs-on: windows-latest
    defaults:
      run:
        working-directory: cpred-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Builds for this runner's OS and uploads installers to the draft
      # GitHub Release the mac job created for this tag. Go to the repo's
      # Releases page and click "Publish release" once this finishes to make
      # the update visible to installed apps.
      - run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
